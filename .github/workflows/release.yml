name: Release

on:
  push:
    branches: [main]

permissions: {}

jobs:
  release:
    if: startsWith(github.event.head_commit.message, 'release:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # for `npm publish --provenance`
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: ./.github/actions/pnpm

      - name: Build
        run: pnpm run build

      - name: Extract version from commit message
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          COMMIT_SUBJECT=${COMMIT_MESSAGE%%$'\n'*}
          VERSION=$(sed -nE 's/^release: (v[0-9]+\.[0-9]+\.[0-9]+).*/\1/p' <<< "${COMMIT_SUBJECT}")
          if [[ -z "${VERSION}" ]]; then
            ESCAPED_COMMIT_SUBJECT=${COMMIT_SUBJECT//'%'/'%25'}
            ESCAPED_COMMIT_SUBJECT=${ESCAPED_COMMIT_SUBJECT//$'\r'/'%0D'}
            ESCAPED_COMMIT_SUBJECT=${ESCAPED_COMMIT_SUBJECT//$'\n'/'%0A'}
            echo "::error::Could not extract release version from commit subject: ${ESCAPED_COMMIT_SUBJECT}" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - run: npm install -g npm@latest # For trusted publishing support

      - name: Publish to NPM
        run: npm publish --tag latest --provenance --access public

      - name: Create and push tag
        run: |
          git tag ${VERSION}
          git push origin ${VERSION}

      - run: npx changelogithub
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
